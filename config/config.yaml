# ===== COCO Dataset Configuration =====
coco:
  data_root: "data/coco"
  images_dir: "val2017"
  annotations_file: "instances_val2017.json"
  urls:
    images: "http://images.cocodataset.org/zips/val2017.zip"
    annotations: "http://images.cocodataset.org/annotations/annotations_trainval2017.zip"

# ===== Filtering Parameters =====
filtering:
  # All valid categories under COCO supercategory = 'animal'
  default_animal_categories:
    # - "bird"
    - "cat"
    - "dog"
    # - "horse"
    # - "sheep"
    # - "cow"
    # - "elephant"
    # - "bear"
    # - "zebra"
    # - "giraffe"
  min_instances: 2          # Min animal instances per image
  min_categories: 2         # Min animal categories per image
  min_area: 2000            # Min bbox area (px²), w * h
  exclude_crowd: true       # Exclude iscrowd=1
  max_overlap_ratio: 0.8    # Remove smaller overlapping mask if intersection ratio > threshold (0.0~1.0)

# ===== Output =====
output:
  data_dir: "output/data"
  csv_path: "output/test_samples.csv"

# ===== Annotation / Review =====
annotation:
  default_annotator: "anonymous"
  review_output_dir: "output/review_labels"
  use_imshow_by_default: false

# ===== Dataset Asset Layer =====
assets:
  dataset_root: "assets/datasets"
  ground_truth_root: "assets/ground_truth"
  prediction_root: "assets/predictions"
  schema_version: 1
  prediction_schema_version: 1

# ===== Eye Localization Parameters =====
eye_detection:
  method: "ai"                    # "cv" or "ai"
  min_head_pixels: 400            # Min mask pixels (skip detection if smaller)
  
  # --- AI Localization Backend Parameters ---
  ai_model:
    # MMPoseInferencer alias ('animal' maps to AP-10K model automatically)
    # Default: rtmpose-m_8xb64-210e_ap10k-256x256
    alias: "animal"
    runtime: "pytorch"            # "pytorch" or "onnx"
    score_threshold: 0.3          # Keypoint confidence threshold
    device: "cpu"                 # Backend execution target when applicable
    onnx_model_path: "models/rtmpose_ap10k/end2end.onnx"
    onnx_artifact_url: "https://download.openmmlab.com/mmpose/v1/projects/rtmposev1/onnx_sdk/rtmpose-m_simcc-ap10k_pt-aic-coco_210e-256x256-7a041aa1_20230206.zip"
    onnx_artifact_sha256: "2d75445331cf2f21d6e164430f96ffa765cd874872965ae1736932dda03987f0"
    providers:
      - "CPUExecutionProvider"

  # --- Haar Cascade Parameters ---
  cascade:
    cat_face_scale: 1.05          # detectMultiScale scaleFactor (cat face)
    cat_face_neighbors: 3         # detectMultiScale minNeighbors (cat face)
    eye_scale: 1.05               # detectMultiScale scaleFactor (eyes)
    eye_neighbors: 2              # detectMultiScale minNeighbors (eyes, loose)
    eye_min_size_ratio: 0.03      # Min eye size ratio vs ROI
    eye_max_size_ratio: 0.25      # Max eye size ratio vs ROI
  # --- CLAHE Contrast Enhancement ---
  clahe:
    clip_limit: 3.0               # CLAHE contrast clip limit
    tile_size: 8                  # CLAHE grid size
  # --- Blob Detection (Stage 3 Fallback) ---
  blob:
    min_circularity: 0.3          # Minimum circularity
    min_convexity: 0.5            # Minimum convexity
    area_ratio_range: [0.002, 0.08]  # Blob area ratio range vs Mask
  # --- Geometric Validation ---
  validation:
    max_eye_angle_deg: 30.0       # Max allowable tilt angle between eyes
    spacing_ratio_range: [0.10, 0.60]  # Eye spacing ratio range vs ROI width

# ===== Download Settings =====
download:
  chunk_size: 8192          # Streaming download chunk size (bytes)
  max_retries: 3
  retry_backoff: 2.0        # Exponential backoff base (seconds)
  connect_timeout: 30       # Connection timeout (seconds)
  read_timeout: 300         # Read timeout (seconds)
